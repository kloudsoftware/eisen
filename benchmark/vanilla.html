<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>vanilla</title></head>
<body>
<div id="main">
    <div class="container">
        <div class="jumbotron"><div class="row">
            <div class="col-md-6"><h1>vanilla</h1></div>
            <div class="col-md-6"><div class="row">
                <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="run">Create 1,000 rows</button></div>
                <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="runlots">Create 10,000 rows</button></div>
                <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="add">Append 1,000 rows</button></div>
                <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="update">Update every 10th row</button></div>
                <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="clear">Clear</button></div>
                <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="swaprows">Swap Rows</button></div>
            </div></div>
        </div></div>
        <table class="table table-hover table-striped test-data"><tbody id="tbody"></tbody></table>
    </div>
</div>
<script>
'use strict';
const adjectives = ["pretty","large","big","small","tall","short","long","handsome","plain","quaint","clean","elegant","easy","angry","crazy","helpful","mushy","odd","unsightly","adorable","important","inexpensive","cheap","expensive","fancy"];
const colours = ["red","yellow","blue","green","pink","brown","purple","brown","white","black","orange"];
const nouns = ["table","chair","house","bbq","desk","car","pony","cookie","sandwich","burger","pizza","mouse","keyboard"];
let data = [], selected = 0, nextId = 1;
function _random(max) { return Math.round(Math.random()*1000)%max; }
function buildData(count) {
    const d = [];
    for (let i = 0; i < count; i++)
        d.push({id: nextId++, label: adjectives[_random(adjectives.length)]+" "+colours[_random(colours.length)]+" "+nouns[_random(nouns.length)]});
    return d;
}

const tbody = document.getElementById('tbody');

function createRow(d) {
    const tr = document.createElement('tr');
    tr.dataset.id = d.id;
    tr.innerHTML = `<td class="col-md-1">${d.id}</td><td class="col-md-4"><a class="lbl">${d.label}</a></td><td class="col-md-1"><a class="remove"><span class="glyphicon glyphicon-remove"></span></a></td><td class="col-md-6"></td>`;
    return tr;
}

function renderAll() {
    tbody.textContent = '';
    const frag = document.createDocumentFragment();
    for (const d of data) frag.appendChild(createRow(d));
    tbody.appendChild(frag);
    updateSelected();
}

function updateSelected() {
    const prev = tbody.querySelector('.danger');
    if (prev) prev.className = '';
    if (selected) {
        const row = tbody.querySelector(`tr[data-id="${selected}"]`);
        if (row) row.className = 'danger';
    }
}

document.getElementById('run').onclick = () => { data = buildData(1000); selected = 0; renderAll(); };
document.getElementById('runlots').onclick = () => { data = buildData(10000); selected = 0; renderAll(); };
document.getElementById('add').onclick = () => { const d = buildData(1000); data = data.concat(d); const frag = document.createDocumentFragment(); for (const r of d) frag.appendChild(createRow(r)); tbody.appendChild(frag); };
document.getElementById('update').onclick = () => { for (let i = 0; i < data.length; i += 10) { data[i].label += ' !!!'; tbody.children[i].querySelector('.lbl').textContent = data[i].label; } };
document.getElementById('clear').onclick = () => { data = []; selected = 0; tbody.textContent = ''; };
document.getElementById('swaprows').onclick = () => { if (data.length > 998) { const t = data[1]; data[1] = data[998]; data[998] = t; const rows = tbody.children; tbody.insertBefore(rows[998], rows[1]); tbody.insertBefore(rows[2], rows[999]); } };

tbody.onclick = (e) => {
    const el = e.target;
    if (el.classList.contains('lbl')) {
        const id = +el.closest('tr').dataset.id;
        selected = id;
        updateSelected();
    } else if (el.classList.contains('remove') || el.closest('.remove')) {
        const tr = el.closest('tr');
        const id = +tr.dataset.id;
        data = data.filter(d => d.id !== id);
        tr.remove();
    }
};
</script>
</body>
</html>
